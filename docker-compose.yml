services:
  mongodb:
    image: mongo:latest
    container_name: healthblock_db
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: healthblock_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/healthblock
      - JWT_SECRET=healthblock_super_secret_jwt_key_2024
      - NODE_ENV=development
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: healthblock_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
